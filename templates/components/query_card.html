<div class="card bg-base-100 shadow-sm cursor-pointer hover:shadow-md hover:border-primary/30 border border-transparent transition-all"
  hx-get="/query/{{ query.id }}"
  hx-target="#query-detail"
  hx-swap="innerHTML">
  <div class="card-body p-3">
    <h3 class="card-title text-sm">{{ query.name }}</h3>
    <p class="text-xs text-base-content/50 line-clamp-2">{{ query.description }}</p>
  </div>
</div>
