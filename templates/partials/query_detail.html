<div class="card bg-base-100 shadow">
  <div class="card-body">
    <h2 class="card-title">{{ query.name }}</h2>
    <p class="text-base-content/70">{{ query.description }}</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
      <div>
        <h3 class="font-semibold text-sm mb-1">Before (raw data)</h3>
        <pre class="bg-base-200 p-3 rounded text-xs overflow-x-auto"><code>{{ query.before_query }}</code></pre>
      </div>
      <div>
        <h3 class="font-semibold text-sm mb-1">After (AI-enriched)</h3>
        <pre class="bg-base-200 p-3 rounded text-xs overflow-x-auto"><code>{{ query.after_query }}</code></pre>
      </div>
    </div>

    <div class="card-actions justify-end mt-4">
      <button class="btn btn-primary"
        hx-post="/query/{{ query.id }}/run"
        hx-target="#results-area"
        hx-swap="innerHTML">
        Run Query
      </button>
    </div>
  </div>
</div>
